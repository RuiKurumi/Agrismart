name: agrismart
description: Flutter app with Firebase authentication

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  # Image picker for profile photo
  image_picker: ^1.0.7
  # PIN code input
  pin_code_fields: ^8.0.1
  # Google Sign In
  google_sign_in: ^7.0.0
  cupertino_icons: ^1.0.2
  google_generative_ai: ^0.4.3
  connectivity_plus: ^6.0.3
  llama_flutter_android: ^0.1.1
  flutter_dotenv: ^5.1.0
  http: ^1.2.0
  firebase_storage: ^11.6.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  assets:
    - .env
  uses-material-design: true