<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Sign Up | FarmGrow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="page-shell">

  <!-- LEFT SIDE -->
  <div class="brand-panel">
    <h1>FarmGrow Admin</h1>
    <p>Create your administrator account and manage farms efficiently.</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="form-panel">
    <div class="form-card">

      <h2>Create Account</h2>
      <p>Join the FarmGrow system</p>

      <form>

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Jane Doe" required>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="admin@example.com" required>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>Password</label>
            <input type="password" required>
          </div>

          <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" required>
          </div>
        </div>

        <div class="input-group">
          <label>Admin Code</label>
          <input type="text" placeholder="Enter code" required>
        </div>

        <button class="btn-primary">Create Account</button>

        <div class="extra-link center">
          <span>Already have an account?</span>
          <a href="login.html">Login</a>
        </div>

      </form>

    </div>
  </div>

</div>
