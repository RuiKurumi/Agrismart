<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | FarmGrow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="page-shell">

  <!-- LEFT SIDE -->
  <div class="brand-panel">
    <h1>FarmGrow Admin</h1>
    <p>Secure admin access for smart agriculture systems.</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="form-panel">
    <div class="form-card">

      <h2>Welcome back</h2>
      <p>Login to your admin dashboard</p>

      <form>
        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="admin@example.com" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter password" required>
        </div>

        <div class="extra-link">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button class="btn-primary">Log In</button>

        <div class="extra-link center">
          <span>No account?</span>
          <a href="signup.html">Sign up</a>
        </div>
      </form>

    </div>
  </div>

</div>

</body>
